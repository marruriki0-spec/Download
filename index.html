<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ปลดล็อกดาวน์โหลด</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
    </script>

    <style>
        /* ===== RESET + BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background: #0b0b12;
            color: #f0f0f5;
            position: relative;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(circle at 20% 30%, #1e1029, #0b0b12 70%);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }
        @keyframes bgPulse {
            0% {
                background: radial-gradient(circle at 20% 30%, #1e1029, #0b0b12 70%);
            }
            100% {
                background: radial-gradient(circle at 80% 70%, #1a0a2e, #0b0b12 70%);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            padding: 48px 36px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(168, 85, 247, 0.05) inset;
            transition: 0.4s;
        }

        .badge {
            display: inline-block;
            background: rgba(168, 85, 247, 0.08);
            border: 1px solid rgba(168, 85, 247, 0.08);
            padding: 6px 22px;
            border-radius: 60px;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #a78bfa;
            margin-bottom: 18px;
            backdrop-filter: blur(4px);
        }

        h1 {
            font-size: clamp(2rem, 5.5vw, 3.4rem);
            font-weight: 800;
            line-height: 1.2;
            background: linear-gradient(135deg, #f0f0f5 20%, #a78bfa 60%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px rgba(168, 85, 247, 0.08));
        }

        .sub {
            font-weight: 300;
            color: rgba(255, 255, 255, 0.3);
            margin: 6px 0 28px;
            letter-spacing: 1.5px;
            font-size: 0.9rem;
        }

        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 16px;
            max-width: 420px;
            margin: 0 auto 40px;
        }

        .progress-bar {
            flex: 1;
            height: 5px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.5);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #7c3aed, #a855f7, #d946ef);
            border-radius: 20px;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: -2px;
            width: 12px;
            height: 9px;
            background: #a855f7;
            border-radius: 50%;
            filter: blur(8px);
            opacity: 0.7;
        }

        .progress-label {
            font-weight: 600;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.35);
            min-width: 44px;
            text-align: right;
            letter-spacing: 0.3px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 28px;
            padding: 32px 18px 26px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.08), transparent 60%, rgba(168, 85, 247, 0.03));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(168, 85, 247, 0.12);
            box-shadow: 0 24px 60px rgba(168, 85, 247, 0.06), 0 0 0 1px rgba(168, 85, 247, 0.05) inset;
        }

        .card i {
            font-size: 2.8rem;
            color: #a855f7;
            margin-bottom: 10px;
            display: inline-block;
            transition: 0.4s ease;
            filter: drop-shadow(0 0 12px rgba(168, 85, 247, 0.08));
        }

        .card:hover i {
            transform: scale(1.12) rotate(-4deg);
            filter: drop-shadow(0 0 28px rgba(168, 85, 247, 0.15));
        }

        .card h3 {
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.2px;
        }

        .card p {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.25);
            margin: 4px 0 18px;
            font-weight: 300;
        }

        /* ===== BUTTON ===== */
        .btn-task {
            background: rgba(168, 85, 247, 0.06);
            border: 1px solid rgba(168, 85, 247, 0.1);
            color: #c084fc;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .btn-task:hover:not(:disabled) {
            background: rgba(168, 85, 247, 0.14);
            border-color: #a855f7;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.08);
            transform: scale(1.04);
        }

        .btn-task:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-task.done {
            background: rgba(34, 197, 94, 0.08);
            border-color: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 600;
        }

        .btn-task.done i {
            font-size: 0.9rem;
            color: #4ade80;
            margin: 0;
            filter: none;
            animation: popCheck 0.4s ease;
        }

        @keyframes popCheck {
            0% {
                transform: scale(0.3) rotate(-20deg);
                opacity: 0;
            }
            60% {
                transform: scale(1.3) rotate(5deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .status-text {
            display: none;
        }

        /* ===== DOWNLOAD ===== */
        .download-wrap {
            text-align: center;
            margin-top: 6px;
        }

        #downloadBtn {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 16px 48px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.15);
            cursor: not-allowed;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
            min-width: 240px;
        }

        #downloadBtn.active {
            background: linear-gradient(135deg, #6d28d9, #7c3aed, #a855f7);
            border-color: rgba(168, 85, 247, 0.2);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.15), 0 0 100px rgba(168, 85, 247, 0.04);
            animation: glowPulse 2.8s ease-in-out infinite;
        }

        #downloadBtn.active:hover {
            transform: scale(1.05);
            box-shadow: 0 0 70px rgba(168, 85, 247, 0.25), 0 0 140px rgba(168, 85, 247, 0.08);
        }

        @keyframes glowPulse {
            0%,
            100% {
                box-shadow: 0 0 50px rgba(168, 85, 247, 0.15), 0 0 100px rgba(168, 85, 247, 0.04);
            }
            50% {
                box-shadow: 0 0 70px rgba(168, 85, 247, 0.25), 0 0 140px rgba(168, 85, 247, 0.08);
            }
        }

        .hint {
            margin-top: 14px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.15);
            font-weight: 300;
            letter-spacing: 0.8px;
            transition: 0.4s;
        }

        .hint.success {
            color: #4ade80;
            font-weight: 400;
        }

        @media (max-width: 640px) {
            .container {
                padding: 28px 16px;
                border-radius: 28px;
            }
            .grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            #downloadBtn {
                min-width: 180px;
                padding: 14px 24px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">

        <div class="badge">✦ สิทธิ์พิเศษ</div>

        <h1>ทำภารกิจให้ครบ<br />เพื่อปลดล็อกดาวน์โหลด</h1>
        <p class="sub">3 ขั้นตอนง่าย ๆ · รับเลยทันที</p>

        <div class="progress-wrap">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="progress-label" id="progressLabel">0 / 3</span>
        </div>

        <div class="grid">

            <div class="card" data-task="1">
                <i class="fab fa-tiktok"></i>
                <h3>ติดตาม TikTok</h3>
                <p>@riki74139</p>
                <button class="btn-task" data-task="1" data-url="https://www.tiktok.com/@riki74139?_r=1&_t=ZS-97hDUT7To1d">เริ่มทำภารกิจ</button>
                <div class="status-text" style="display:none;"></div>
            </div>

            <div class="card" data-task="2">
                <i class="fab fa-youtube"></i>
                <h3>ติดตาม YouTube</h3>
                <p>@user-wv4hy7up9j</p>
                <button class="btn-task" data-task="2" data-url="https://www.youtube.com/@user-wv4hy7up9j?sub_confirmation=1">เริ่มทำภารกิจ</button>
                <div class="status-text" style="display:none;"></div>
            </div>

            <div class="card" data-task="3">
                <i class="fas fa-comment"></i>
                <h3>คอมเมนต์คลิป</h3>
                <p>คลิป: ODpxafr3spE</p>
                <button class="btn-task" data-task="3" data-url="https://youtu.be/ODpxafr3spE?si=sjWvJU6lpr7QyxFK">เริ่มทำภารกิจ</button>
                <div class="status-text" style="display:none;"></div>
            </div>

        </div>

        <div class="download-wrap">
            <button id="downloadBtn" disabled>
                <i class="fas fa-lock"></i> ดาวน์โหลดถูกล็อก
            </button>
            <p class="hint" id="hintText">ทำภารกิจให้ครบ 3 ข้อเพื่อปลดล็อก</p>
        </div>

    </div>

    <script>
        // ============================================================
        //  LOGIC
        // ============================================================

        var tasks = {
            1: false,
            2: false,
            3: false
        };

        var progressFill = document.getElementById('progressFill');
        var progressLabel = document.getElementById('progressLabel');
        var downloadBtn = document.getElementById('downloadBtn');
        var hintText = document.getElementById('hintText');

        var DOWNLOAD_URL = 'https://www.mediafire.com/file/c5atj1r616owyy2/global-metadata.dat/file';

        function updateProgress() {
            var done = 0;
            for (var key in tasks) {
                if (tasks[key]) done++;
            }
            var total = 3;
            var percent = (done / total) * 100;

            progressFill.style.width = percent + '%';
            progressLabel.textContent = done + ' / ' + total;

            if (done === total) {
                downloadBtn.disabled = false;
                downloadBtn.classList.add('active');
                downloadBtn.innerHTML = '<i class="fas fa-download"></i> ดาวน์โหลดเลย';
                hintText.textContent = '🎉 ครบทุกภารกิจแล้ว! พร้อมดาวน์โหลด';
                hintText.classList.add('success');

                if (typeof gsap !== 'undefined') {
                    gsap.fromTo(downloadBtn, { scale: 0.7, opacity: 0 }, {
                        scale: 1,
                        opacity: 1,
                        duration: 0.8,
                        ease: 'back.out(1.7)'
                    });
                }
            }
        }

        var buttons = document.querySelectorAll('.btn-task');

        for (var i = 0; i < buttons.length; i++) {
            (function(btn) {
                btn.addEventListener('click', function() {
                    var taskId = parseInt(this.getAttribute('data-task'));
                    if (tasks[taskId]) return;

                    var url = this.getAttribute('data-url');
                    if (url) window.open(url, '_blank');

                    tasks[taskId] = true;
                    this.classList.add('done');
                    this.innerHTML = '<i class="fas fa-check-circle"></i> เรียบร้อย';
                    this.disabled = true;

                    updateProgress();

                    var allDone = true;
                    for (var k in tasks) {
                        if (!tasks[k]) allDone = false;
                    }

                    if (allDone) {
                        var cards = document.querySelectorAll('.card');
                        for (var c = 0; c < cards.length; c++) {
                            cards[c].style.transition = 'transform 0.3s';
                            cards[c].style.transform = 'translateY(-10px)';
                            setTimeout(function(el) {
                                el.style.transform = 'translateY(0)';
                            }, 400, cards[c]);
                        }
                    }
                });
            })(buttons[i]);
        }

        downloadBtn.addEventListener('click', function() {
            if (!this.disabled) {
                if (typeof gsap !== 'undefined') {
                    gsap.fromTo(this, { scale: 1 }, {
                        scale: 0.88,
                        duration: 0.12,
                        yoyo: true,
                        repeat: 1,
                        onComplete: function() {
                            window.open(DOWNLOAD_URL, '_blank');
                        }
                    });
                } else {
                    window.open(DOWNLOAD_URL, '_blank');
                }
            }
        });

        console.log('✅ ปลดล็อกดาวน์โหลด ทำงานแล้ว!');
    </script>

</body>
</html>
